<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Energy Monitor</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%233b82f6'/%3E%3Ctext x='50' y='70' font-size='50' text-anchor='middle' fill='white'%3E⚡%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css">
  <!-- Flaticon UIcons – Solid Rounded (free, attribution required) -->
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-solid-rounded/css/uicons-solid-rounded.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <img id="logo-img" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%233b82f6'/%3E%3Ctext x='50' y='70' font-size='50' text-anchor='middle' fill='white'%3E⚡%3C/text%3E%3C/svg%3E" alt="Logo" style="height:40px; margin-right:1rem;">
        <h1 id="dashboard-title">⚡ Energy Dashboard</h1>
      </div>
      <div class="header-right">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark/light mode">
          <span class="theme-icon">🌙</span>
        </button>
        <a href="/settings" class="settings-link">⚙️ Settings</a>
      </div>
    </header>

    <!-- Flow Card (all Flaticon icons) -->
    <div class="flow-card">
      <div class="flow-item solar">
        <div class="flow-icon"><i id="icon-solar" class="fi fi-sr-sun"></i></div>
        <div class="flow-label">Solar</div>
        <div class="flow-value" id="flow-solar">0 W</div>
      </div>
      <div class="flow-arrow solar-home">→</div>
      <div class="flow-item battery">
        <!-- Flaticon battery icon – class changes dynamically based on SOC -->
        <div class="flow-icon"><i id="icon-battery" class="fi fi-sr-battery-full"></i></div>
        <div class="flow-label">Battery</div>
        <div class="flow-value" id="flow-battery-soc">--%</div>
        <div class="flow-sub" id="flow-battery-power">⚡ 0 W</div>
      </div>
      <div class="flow-arrow battery">⇄</div>
      <div class="flow-item home">
        <div class="flow-icon"><i id="icon-home" class="fi fi-sr-home"></i></div>
        <div class="flow-label">Home</div>
        <div class="flow-value" id="flow-home">0 W</div>
      </div>
      <div class="flow-arrow grid">⇄</div>
      <div class="flow-item grid">
        <div class="flow-icon"><i id="icon-grid" class="fi fi-sr-bolt"></i></div>
        <div class="flow-label">Grid</div>
        <div class="flow-value" id="flow-grid">0 W</div>
        <div class="flow-sub" id="flow-grid-direction">Import</div>
      </div>
    </div>
    <div id="grid-to-battery" style="display:none; text-align:center; margin-top:-0.5rem; margin-bottom:1rem; color:var(--grid); font-size:0.9rem;">
      <span id="grid-to-battery-arrow">↑</span> Grid charging battery <span id="grid-to-battery-arrow">↑</span>
    </div>

    <!-- Solar Forecast – Expanded Row (unchanged) … -->
    <!-- … keep the rest exactly as before … -->
  </div>
  <script src="script.js"></script>
</body>
</html>
